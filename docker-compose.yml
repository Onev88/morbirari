services:
  postgres:
    image: postgres:16-alpine
    container_name: morbirari-postgres
    environment:
      POSTGRES_USER: morbirari
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morbirari_dev}
      POSTGRES_DB: morbirari
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morbirari -d morbirari"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: morbirari-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-morbirari_dev_master_key}
      MEILI_ENV: ${MEILI_ENV:-development}
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "meilisearch", "--help"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  meilidata:
