name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  etl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Los tests corren contra fixtures fijados, sin red y sin base de datos:
      # si Orphanet cambia su XML, esto falla antes de que lleguen datos erróneos.
      - run: pytest -q
      - run: ruff check src tests

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
